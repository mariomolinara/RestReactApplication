spring:
  application:
    name: RestReactApplication

  # ── DataSource (PostgreSQL) ──────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/friendsdb}
    username: ${DB_USERNAME:friends_user}
    password: ${DB_PASSWORD:friends_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000        # 30 s
      connection-timeout: 20000  # 20 s
      max-lifetime: 1800000      # 30 min

  # ── JPA / Hibernate ──────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

# ── Spring Boot Actuator ─────────────────────────────────────
# Exposes /actuator/health so the Docker HEALTHCHECK can probe
# the real application status (DB connectivity included).
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never   # do not leak stack traces to the outside world

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
